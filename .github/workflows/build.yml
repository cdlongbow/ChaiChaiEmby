name: Build APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "版本号（如 0.3.1），留空自动生成"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleDebug

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version_name }}" ]; then
            echo "tag=${{ inputs.version_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(date +%Y%m%d.%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "hemby ${{ steps.version.outputs.tag }}"
          body: |
            自动构建于 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ## APK 说明
            - **armeabi-v7a** — ARM7 32-bit（Android TV 常用）
            - **arm64-v8a** — ARM64
            - **universal** — 全架构（体积最大）
          files: |
            app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: false